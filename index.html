<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evento Cancelado - Bruno Esgalha</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .container {
            max-width: 600px;
            animation: fadeInUp 0.8s ease;
        }
        .badge {
            display: inline-block;
            padding: 8px 24px;
            border: 1px solid rgba(212,175,55,0.5);
            border-radius: 50px;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #d4af37;
            margin-bottom: 2rem;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #d4af37, #f4e4a0, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .message {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            color: #ccc;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }
        .cta {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #d4af37, #c49b2a);
            color: #0a0a0a;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .cta:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(212,175,55,0.3); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Comunicado</div>
        <h1>Evento Cancelado</h1>
        <p class="message">
            Por motivos de força maior, o aniversário do dia <strong style="color:#d4af37">9 de Maio</strong> foi cancelado.<br><br>
            Agradecemos imensamente o carinho e o interesse de cada um de vocês. Em breve marcamos algo novo para celebrarmos juntos.<br><br>
            Para qualquer dúvida, fale diretamente com o <strong style="color:#d4af37">Bruno</strong>.
        </p>
    </div>
</body>
</html>
